name: Update Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1-5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance pyarrow requests

      - name: Create folders
        run: |
          mkdir -p data/raw data/processed data/predictions

      - name: Download market data
        run: |
          python src/data/download_market_data.py --universe ticker_universe.json --output data/raw/market_data.parquet

      - name: Commit updated market data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/raw/market_data.parquet
          git commit -m "Update market data" || echo "No changes to commit"
          git push
